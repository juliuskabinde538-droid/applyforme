<script>
emailjs.init('YOUR_EMAILJS_PUBLIC_KEY');

function scrollToForm(){
document.getElementById('form-section').scrollIntoView({behavior:'smooth'});
}

async function generateCoverLetter(){
const firstName=document.getElementById('firstName').value;
const email=document.getElementById('email').value;
const role=document.getElementById('role').value;
const skills=document.getElementById('skills').value;

if(!firstName || !email || !role){
alert('Please fill all required fields');
return;
}

const resultBox=document.getElementById('resultBox');
const resultText=document.getElementById('resultText');

resultBox.style.display='block';
resultText.innerHTML='Generating cover letter...';

try{
const prompt=`Write a professional South African cover letter for ${role}. Skills: ${skills}`;

const response=await fetch('/api/generate-cover-letter',{
method:'POST',
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify({prompt})
});

const data=await response.json();

const text=data.content?.[0]?.text || 'Cover letter generated successfully';

resultText.innerHTML=text;

emailjs.send('YOUR_SERVICE_ID','YOUR_TEMPLATE_ID',{
user_email:email,
first_name:firstName,
cover_letter:text
});

}catch(error){
console.error(error);

resultText.innerHTML=`Dear Hiring Manager,

I am excited to apply for the ${role} role. My experience in ${skills} makes me confident I can contribute positively to your team.

I am eager to discuss how my skills align with your company needs.

Kind regards,
${firstName}`;
}
}

function payNow(){
const plan=document.getElementById('plan').value;

if(plan==='pro'){
window.location.href='https://www.payfast.co.za/eng/process?amount=120';
}else{
window.location.href='https://www.payfast.co.za/eng/process?amount=50';
}
}
</script>
